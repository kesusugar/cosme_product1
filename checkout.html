  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf8f5;
      --blush: #f2e8e0;
      --rose: #c9a99a;
      --deep-rose: #a07060;
      --text: #3a2e2b;
      --text-light: #8a7570;
      --white: #ffffff;
      --border: #ede8e3;
      --focus: #c9a99a;
      --error: #e07070;
    }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--text);
      text-decoration: none;
    }

    /* ── Breadcrumb ── */
    .breadcrumb {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 24px 0;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: var(--text-light);
      letter-spacing: 0.08em;
    }
    .breadcrumb a { color: var(--text-light); text-decoration: none; }
    .breadcrumb a:hover { color: var(--rose); }
    .breadcrumb .sep { color: var(--border); }
    .breadcrumb .current { color: var(--rose); }

    /* ── Step Indicator ── */
    .steps {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 24px;
      display: flex;
      align-items: center;
    }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
      position: relative;
    }
    .step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 14px;
      left: 50%;
      width: 100%;
      height: 1px;
      background: var(--border);
    }
    .step.done:not(:last-child)::after { background: var(--rose); }
    .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-light);
      background: var(--white);
      position: relative;
      z-index: 1;
    }
    .step.active .step-num { border-color: var(--rose); background: var(--rose); color: var(--white); }
    .step.done .step-num { border-color: var(--rose); color: var(--rose); }
    .step-label { font-size: 9px; letter-spacing: 0.08em; color: var(--text-light); white-space: nowrap; }
    .step.active .step-label { color: var(--rose); }

    /* ── Layout ── */
    .checkout-layout {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.06em;
      margin-bottom: 24px;
      color: var(--text);
    }

    /* ── Order Mini Summary ── */
    .mini-summary {
      background: var(--blush);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .mini-summary-left { font-size: 13px; color: var(--text); }
    .mini-summary-left span { font-size: 11px; color: var(--text-light); display: block; margin-top: 2px; }
    .mini-summary-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--text);
    }

    /* ── Form Card ── */
    .form-card {
      background: var(--white);
      border-radius: 18px;
      padding: 26px 24px;
      margin-bottom: 18px;
      box-shadow: 0 2px 14px rgba(160,112,96,0.07);
    }
    .form-card-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--text-light);
      text-transform: uppercase;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Form Fields ── */
    .field-group { margin-bottom: 16px; }
    .field-row { display: flex; gap: 12px; }
    .field-row .field-group { flex: 1; }
    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--text-light);
      margin-bottom: 6px;
    }
    .required-mark { color: var(--rose); margin-left: 2px; }
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--white);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }
    input:focus, select:focus { border-color: var(--focus); }
    input::placeholder { color: #c8beba; }

    /* ── Payment Method ── */
    .payment-options {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }
    .payment-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .payment-option:has(input:checked) {
      border-color: var(--rose);
      background: #fdf5f3;
    }
    .payment-option input[type="radio"] {
      width: 16px;
      height: 16px;
      accent-color: var(--rose);
      flex-shrink: 0;
      cursor: pointer;
    }
    .payment-label {
      flex: 1;
    }
    .payment-label strong {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 2px;
    }
    .payment-label small {
      font-size: 11px;
      color: var(--text-light);
    }
    .payment-icon {
      font-size: 20px;
    }

    /* ── Card Inputs (displayed when credit card selected) ── */
    .card-fields {
      background: var(--cream);
      border-radius: 12px;
      padding: 18px;
      margin-top: 4px;
      display: none;
    }
    .card-fields.visible { display: block; }
    .card-number-wrap {
      position: relative;
    }
    .card-number-wrap input {
      padding-right: 48px;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.1em;
    }
    .card-icons {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      color: var(--text-light);
    }
    .security-note {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-light);
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    /* ── Place Order Button ── */
    #place-order-button {
      width: 100%;
      height: 54px;
      background: linear-gradient(135deg, var(--deep-rose) 0%, var(--rose) 100%);
      color: var(--white);
      border: none;
      border-radius: 27px;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-bottom: 12px;
      position: relative;
    }
    #place-order-button:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }
    #place-order-button:active { transform: translateY(0); }
    #place-order-button.loading { pointer-events: none; opacity: 0.75; }

    .order-note {
      text-align: center;
      font-size: 11px;
      color: var(--text-light);
      line-height: 1.7;
    }
    .back-link {
      display: block;
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
      text-decoration: none;
      letter-spacing: 0.08em;
      padding: 10px;
      margin-top: 4px;
    }
    .back-link:hover { color: var(--rose); }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 11px;
      color: var(--text-light);
      letter-spacing: 0.1em;
      border-top: 1px solid var(--border);
      background: var(--white);
    }

    @media (max-width: 520px) {
      .field-row { flex-direction: column; }
    }
  </style>

  <script>
    // ── ページロード時: initiate_checkout ──
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      event: 'initiate_checkout'
    });
    console.log('[dataLayer] initiate_checkout fired');

    // ── 支払い方法切り替え（カード入力欄の表示/非表示）──
    const paymentRadios = document.querySelectorAll('input[name="payment"]');
    const cardFields = document.getElementById('card-fields');
    paymentRadios.forEach(function (radio) {
      radio.addEventListener('change', function () {
        if (this.value === 'credit') {
          cardFields.classList.add('visible');
        } else {
          cardFields.classList.remove('visible');
        }
      });
    });

    // ── カード番号フォーマット（スペース区切り）──
    document.getElementById('card-number').addEventListener('input', function () {
      var v = this.value.replace(/\D/g, '').substring(0, 16);
      this.value = v.replace(/(.{4})/g, '$1 ').trim();
    });

    // ── 有効期限フォーマット ──
    document.getElementById('card-expiry').addEventListener('input', function () {
      var v = this.value.replace(/\D/g, '').substring(0, 4);
      if (v.length >= 3) { v = v.substring(0,2) + ' / ' + v.substring(2); }
      this.value = v;
    });

    // ── 注文を確定するボタン ──
    // ※ purchase は発火しない。add_payment_info のみ発火する。
    document.getElementById('place-order-button').addEventListener('click', function () {
      var btn = this;
      btn.classList.add('loading');
      btn.textContent = '処理中...';

      // add_payment_info イベント発火（purchase ではない）
      window.dataLayer.push({
        event: 'add_payment_info',
        content_id: 'beauty_serum_001',
        value: 4200,
        currency: 'JPY'
      });
      console.log('[dataLayer] add_payment_info fired (purchase は発火しない)');

      // purchase_ready フラグをsessionStorageにセット
      sessionStorage.setItem('purchase_ready', 'true');
      console.log('[sessionStorage] purchase_ready = true をセット');

      // thanks.html へ遷移
      setTimeout(function () {
        window.location.href = 'thanks.html';
      }, 600);
    });
  </script>
