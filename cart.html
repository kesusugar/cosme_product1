<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カート | LUMIÈRE</title>

  <!-- dataLayer 初期化 -->
  <script>
    window.dataLayer = window.dataLayer || [];
  </script>

  <!-- Google Tag Manager をここに設置 -->
  <!-- GTM Head Script: <script>(function(w,d,s,l,i){...})(window,document,'script','dataLayer','GTM-XXXXXXX');</script> -->

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf8f5;
      --blush: #f2e8e0;
      --rose: #c9a99a;
      --deep-rose: #a07060;
      --text: #3a2e2b;
      --text-light: #8a7570;
      --gold: #c8a97e;
      --white: #ffffff;
      --border: #ede8e3;
    }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.18em;
      color: var(--text);
      text-decoration: none;
    }

    /* ── Breadcrumb ── */
    .breadcrumb {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 24px 0;
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: var(--text-light);
      letter-spacing: 0.08em;
    }
    .breadcrumb a {
      color: var(--text-light);
      text-decoration: none;
    }
    .breadcrumb a:hover { color: var(--rose); }
    .breadcrumb .sep { color: var(--border); }
    .breadcrumb .current { color: var(--rose); }

    /* ── Step Indicator ── */
    .steps {
      max-width: 520px;
      margin: 0 auto;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 0;
    }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
      position: relative;
    }
    .step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 14px;
      left: 50%;
      width: 100%;
      height: 1px;
      background: var(--border);
    }
    .step.active:not(:last-child)::after,
    .step.done:not(:last-child)::after {
      background: var(--rose);
    }
    .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-light);
      background: var(--white);
      position: relative;
      z-index: 1;
    }
    .step.active .step-num {
      border-color: var(--rose);
      background: var(--rose);
      color: var(--white);
    }
    .step.done .step-num {
      border-color: var(--rose);
      color: var(--rose);
    }
    .step-label {
      font-size: 9px;
      letter-spacing: 0.08em;
      color: var(--text-light);
      white-space: nowrap;
    }
    .step.active .step-label { color: var(--rose); }

    /* ── Main Content ── */
    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.06em;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* ── Cart Item ── */
    .cart-item {
      background: var(--white);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(160,112,96,0.07);
    }
    .cart-item-img {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      background: linear-gradient(145deg, #f9ede7 0%, #ede0d8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .cart-item-info { flex: 1; }
    .cart-item-brand {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 2px;
    }
    .cart-item-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 6px;
    }
    .cart-item-price {
      font-size: 15px;
      font-weight: 500;
      color: var(--deep-rose);
    }
    .cart-item-qty {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .qty-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--white);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-light);
      transition: border-color 0.2s;
    }
    .qty-btn:hover { border-color: var(--rose); color: var(--rose); }
    .qty-num {
      font-size: 14px;
      font-weight: 500;
      width: 20px;
      text-align: center;
    }

    /* ── Order Summary ── */
    .order-summary {
      background: var(--white);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(160,112,96,0.07);
    }
    .summary-title {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--text-light);
      margin-bottom: 14px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 10px;
    }
    .summary-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }
    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .summary-total-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }
    .summary-total-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 400;
      color: var(--text);
    }

    /* ── Checkout Button ── */
    #checkout-button {
      width: 100%;
      height: 52px;
      background: linear-gradient(135deg, var(--deep-rose) 0%, var(--rose) 100%);
      color: var(--white);
      border: none;
      border-radius: 26px;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-bottom: 12px;
    }
    #checkout-button:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }
    #checkout-button:active { transform: translateY(0); }

    .back-link {
      display: block;
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
      text-decoration: none;
      letter-spacing: 0.08em;
      padding: 8px;
    }
    .back-link:hover { color: var(--rose); }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 11px;
      color: var(--text-light);
      letter-spacing: 0.1em;
      border-top: 1px solid var(--border);
      background: var(--white);
    }

    @media (max-width: 520px) {
      .cart-item-img { width: 68px; height: 68px; }
    }
  </style>
</head>
<body>

  <!-- Google Tag Manager (noscript) をここに設置 -->
  <!-- <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript> -->

  <header>
    <a href="index.html" class="logo">LUMIÈRE</a>
    <span style="font-size:11px;color:var(--text-light);letter-spacing:0.1em;">CART</span>
  </header>

  <nav class="breadcrumb">
    <a href="index.html">商品ページ</a>
    <span class="sep">›</span>
    <span class="current">カート</span>
    <span class="sep">›</span>
    <span>お支払い情報</span>
    <span class="sep">›</span>
    <span>購入完了</span>
  </nav>

  <div class="steps">
    <div class="step done">
      <div class="step-num">✓</div>
      <span class="step-label">商品選択</span>
    </div>
    <div class="step active">
      <div class="step-num">2</div>
      <span class="step-label">カート</span>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <span class="step-label">お支払い</span>
    </div>
    <div class="step">
      <div class="step-num">4</div>
      <span class="step-label">完了</span>
    </div>
  </div>

  <main>
    <h1 class="section-title">ショッピングカート</h1>

    <!-- カートアイテム -->
    <div class="cart-item">
      <div class="cart-item-img">
        <svg width="42" height="72" viewBox="0 0 100 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="36" y="8" width="28" height="14" rx="5" fill="#b08878"/>
          <rect x="42" y="22" width="16" height="12" rx="3" fill="#c9a99a"/>
          <rect x="24" y="34" width="52" height="120" rx="14" fill="url(#bottleGrad2)"/>
          <rect x="30" y="42" width="10" height="60" rx="5" fill="rgba(255,255,255,0.35)"/>
          <rect x="28" y="88" width="44" height="52" rx="6" fill="rgba(255,255,255,0.85)"/>
          <text x="50" y="108" font-family="Georgia,serif" font-size="7" fill="#a07060" text-anchor="middle" letter-spacing="1">AI BEAUTY</text>
          <text x="50" y="120" font-family="Georgia,serif" font-size="6" fill="#c9a99a" text-anchor="middle" letter-spacing="1">SERUM</text>
          <defs>
            <linearGradient id="bottleGrad2" x1="24" y1="34" x2="76" y2="154" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#e8cfc4"/>
              <stop offset="100%" stop-color="#c9a99a"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="cart-item-info">
        <p class="cart-item-brand">LUMIÈRE × AI LAB</p>
        <p class="cart-item-name">AI Beauty Serum</p>
        <p class="cart-item-price">¥4,200</p>
        <div class="cart-item-qty">
          <button class="qty-btn" id="qty-minus" aria-label="数量を減らす">−</button>
          <span class="qty-num" id="qty-display">1</span>
          <button class="qty-btn" id="qty-plus" aria-label="数量を増やす">＋</button>
        </div>
      </div>
    </div>

    <!-- 注文サマリー -->
    <div class="order-summary">
      <p class="summary-title">注文概要</p>
      <div class="summary-row">
        <span>小計</span>
        <span id="subtotal">¥4,200</span>
      </div>
      <div class="summary-row">
        <span>送料</span>
        <span style="color:#c9a99a;font-size:12px;">無料</span>
      </div>
      <div class="summary-row">
        <span>消費税（10%）</span>
        <span id="tax-amount">¥420</span>
      </div>
      <hr class="summary-divider" />
      <div class="summary-total">
        <span class="summary-total-label">合計（税込）</span>
        <span class="summary-total-price" id="total-price">¥4,620</span>
      </div>
    </div>

    <!-- 購入手続きへボタン（クリック時はイベント発火不要） -->
    <button id="checkout-button" onclick="window.location.href='checkout.html'">
      購入手続きへ進む →
    </button>
    <a href="index.html" class="back-link">← 買い物を続ける</a>
  </main>

  <footer>© 2025 LUMIÈRE All Rights Reserved.</footer>

  <script>
    // ── ページロード時: view_cart ──
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      event: 'view_cart'
    });
    console.log('[dataLayer] view_cart fired');

    // ── 数量変更UI（表示のみ、イベント発火なし）──
    let qty = 1;
    const unitPrice = 4200;
    const taxRate = 0.10;

    function updatePrices() {
      const subtotal = unitPrice * qty;
      const tax = Math.floor(subtotal * taxRate);
      const total = subtotal + tax;
      document.getElementById('qty-display').textContent = qty;
      document.getElementById('subtotal').textContent = '¥' + subtotal.toLocaleString();
      document.getElementById('tax-amount').textContent = '¥' + tax.toLocaleString();
      document.getElementById('total-price').textContent = '¥' + total.toLocaleString();
    }

    document.getElementById('qty-minus').addEventListener('click', function () {
      if (qty > 1) { qty--; updatePrices(); }
    });
    document.getElementById('qty-plus').addEventListener('click', function () {
      if (qty < 9) { qty++; updatePrices(); }
    });
  </script>

</body>
</html>
