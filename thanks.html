  <meta charset="UTF-8" />

  <title>LUMIÈRE — ご注文完了</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --warm-white: #f5f0e8;
      --gold: #c9a96e;
      --gold-light: #e8d5b0;
      --charcoal: #2a2520;
      --mid: #7a6e65;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.4rem 2.5rem;
      border-bottom: 1px solid var(--gold-light);
      background: var(--cream);
    }
    .nav-brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--charcoal);
      text-decoration: none;
    }

    /* STEPS - all done */
    .steps {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem 0;
    }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }
    .step-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 500;
    }
    .step.done .step-circle { background: var(--gold); color: var(--cream); }
    .step-label { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--mid); }
    .step-line { width: 60px; height: 1px; background: var(--gold); margin: 0 0.5rem; margin-bottom: 1.2rem; }

    /* MAIN THANK YOU */
    .thanks-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      text-align: center;
    }

    /* Animated check circle */
    .check-container {
      position: relative;
      width: 90px;
      height: 90px;
      margin-bottom: 2rem;
    }
    .check-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid var(--gold);
      animation: ringPulse 2s ease-out infinite;
    }
    @keyframes ringPulse {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.6); opacity: 0; }
    }
    .check-circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .check-circle svg {
      animation: drawCheck 0.4s 0.3s ease both;
    }
    @keyframes drawCheck {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Decorative line group */
    .deco-lines {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.2rem;
      animation: fadeUp 0.6s 0.4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .deco-line { width: 40px; height: 1px; background: var(--gold); }
    .deco-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    .thanks-label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      animation: fadeUp 0.6s 0.5s ease both;
    }

    .thanks-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 300;
      line-height: 1.2;
      margin: 0.6rem 0 1rem;
      animation: fadeUp 0.6s 0.55s ease both;
    }
    .thanks-heading em {
      font-style: italic;
      color: var(--gold);
    }

    .thanks-message {
      font-size: 0.85rem;
      color: var(--mid);
      line-height: 1.9;
      max-width: 440px;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s 0.65s ease both;
    }

    /* Order summary box */
    .order-box {
      border: 1px solid var(--gold-light);
      background: var(--warm-white);
      padding: 1.8rem 2.5rem;
      max-width: 440px;
      width: 100%;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s 0.75s ease both;
    }
    .order-box-title {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 1.2rem;
    }

    .order-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--gold-light);
      margin-bottom: 1rem;
    }
    .order-thumb {
      width: 48px;
      height: 48px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .order-item-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      margin-bottom: 0.2rem;
    }
    .order-item-meta { font-size: 0.68rem; color: var(--mid); }

    .order-rows { width: 100%; }
    .order-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--mid);
      margin-bottom: 0.5rem;
    }
    .order-divider { border: none; border-top: 1px solid var(--gold-light); margin: 0.8rem 0; }
    .order-total {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .order-total-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .order-total-amt {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
    }

    /* Order ID */
    .order-id-row {
      margin-top: 1rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--gold-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .order-id-label { font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--mid); }
    .order-id-value { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; letter-spacing: 0.1em; }

    /* CTA Button */
    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.9rem 2.5rem;
      background: transparent;
      border: 1.5px solid var(--charcoal);
      color: var(--charcoal);
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
      animation: fadeUp 0.6s 0.85s ease both;
    }
    .cta-button:hover {
      background: var(--charcoal);
      color: var(--cream);
    }

    /* Email note */
    .email-note {
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: var(--mid);
      letter-spacing: 0.06em;
      animation: fadeUp 0.6s 0.9s ease both;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--gold-light);
      padding: 1.2rem;
      text-align: center;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
    }

    @media (max-width: 600px) {
      .thanks-heading { font-size: 2.2rem; }
      .order-box { padding: 1.2rem; }
      .step-line { width: 30px; }
    }
  </style>
</head>
